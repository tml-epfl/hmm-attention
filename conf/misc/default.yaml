seed: 0
device: cuda
verbose: true
log_attention_frequency: 50
log_frequency: 5
wandb:
  use: true
  project: hmm-attention
  entity: okyksl
  tags: []
  # Resume mode. `false` uses `resume="must"` (silently drops non-monotonic
  # logs) — safe with `checkpoint.frequency=1`. `true` uses wandb Run Rewind
  # (`resume_from`) to truncate + overwrite phantom history — required when
  # `checkpoint.frequency>1`, but is in private preview on wandb.ai as of
  # 2026-07 and errors with `CommError: Rewind is in private preview` unless
  # your workspace has it enabled. Contact wandb support to enable.
  rewind: false
checkpoint:
  # Checkpoints live at `<root>/<config_hash>/checkpoint.pt`. The config-hash
  # subdir is what makes resume "just work" across Runai restarts + sweeps:
  # same resolved config → same dir → same checkpoint → same wandb run.
  # Different sweep configs auto-partition into separate dirs. Hydra's own
  # per-launch output dir stays timestamped (kept for logs/config snapshots).
  #
  # `root` MUST be absolute (or resolve to an absolute path). `hydra.job.chdir:
  # true` means the process chdirs into a fresh timestamped dir on each
  # launch, so a relative `root` would resolve to a *different* location every
  # time and resume would never fire. `${hydra:runtime.cwd}` resolves to the
  # directory where `python train.py` was invoked (before Hydra chdirs) — that
  # is stable across launches from the same working tree.
  enabled: true
  resume: true
  root: ${hydra:runtime.cwd}/outputs/checkpoints
  # Save every Nth log step. 1 = save on every log step (checkpoint step ==
  # last wandb-logged step, no history gap possible on resume). N > 1 saves
  # I/O at the cost of "up to (N-1)*log_frequency training steps of lost
  # work" on resume — wandb drops those re-logs as non-monotonic. Prefer
  # bumping `log_frequency` over this knob if I/O becomes a real bottleneck.
  frequency: 1
probe:
  mode: off              # off | warm_start | sgd
  frequency: 100
  offsets: null          # null → derive from teacher (base_teacher.context_length)
  max_iters: 20          # warm_start (LBFGS)
  l2: 1e-3               # warm_start (LBFGS)
  lr: 1e-2               # sgd (Adam)
  train_frac: 0.8        # within-val split: fit vs. eval

