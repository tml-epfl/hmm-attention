seed: 0
device: cuda
verbose: true
log_attention_frequency: 50
log_frequency: 5
wandb:
  use: true
  project: hmm-attention
  entity: okyksl
  tags: []
checkpoint:
  # Checkpoints live at `<root>/<config_hash>/checkpoint.pt`. The config-hash
  # subdir is what makes resume "just work" across Runai restarts + sweeps:
  # same resolved config → same dir → same checkpoint → same wandb run.
  # Different sweep configs auto-partition into separate dirs. Hydra's own
  # per-launch output dir stays timestamped (kept for logs/config snapshots).
  enabled: true
  resume: true
  root: outputs/checkpoints
probe:
  mode: off              # off | warm_start | sgd
  frequency: 100
  offsets: null          # null → derive from teacher (base_teacher.context_length)
  max_iters: 20          # warm_start (LBFGS)
  l2: 1e-3               # warm_start (LBFGS)
  lr: 1e-2               # sgd (Adam)
  train_frac: 0.8        # within-val split: fit vs. eval

