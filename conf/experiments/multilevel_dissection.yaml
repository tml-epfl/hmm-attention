# @package _global_
# Identical to hierarchical_dissection.yaml, but driven by the multi-level
# teacher (with a single level, L=1, it is the same process). Sanity check that
# MultiLevelHierarchicalTeacher + the multi-level probe reproduce the known
# single-level hierarchical dissection results.
defaults:
  - override /teacher: multilevel
  - override /teacher/base_teacher: linear
  - _self_

# One level: hidden vocab = 64, surface vocab = 64, chunk_size = 2. Base linear
# process over the hidden vocab (matches hierarchical_dissection).
teacher:
  levels:
    - {chunk_dim: 64, chunk_size: 2, num_tuples: 1, chunk_seed: null}
  base_teacher:
    dim: 64                        # hidden vocab
    rank: 64
    window: 3
    span_lengths: [1, 1, 1]        # in hidden space
    multiplicative_constant: 1.0
    scale: 10                      # sharpness (formerly `temperature: 0.1`)

dataset:
  window: 3
  dim: 64                          # surface vocab (= chunk_dim)
  length: 20                       # 10 hidden * chunk_size(2) surface tokens
  number:
    train: -15000

trainer:
  batch_size: 15000
  steps: 10000

student:
  dim: 64                          # = chunk_dim
  pe_max_sequence_length: 64
  dropout: 0.0
  use_key_projection: false
  layer_normalization: false
  use_mlp: true
  ff_hidden_dim: 256
  teacher_readout: false
  use_output_projection: false
  skip_connection: true
  attention_disentanglement: true
  pe_type: one_hot
  identity_decoder: true
  attention_bias: false
  num_blocks: 2

optimizer:
  lr: 0.01

misc:
  probe:
    mode: sgd
  wandb:
    tags: ["multilevel-dissection", "span-1-1-1", "version-1"]
