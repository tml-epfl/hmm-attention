# @package _global_
defaults:
  - override /model@teacher: hierarchical
  - _self_

# Hierarchical wrapper: hidden vocab = 64, surface vocab = 64, chunk_size = 2.
# Effective sequence: prefix = 3 hidden tokens = 6 surface tokens; total = (3+20)*2 = 46.
teacher:
  chunk_dim: 64
  chunk_size: 2
  base_teacher:
    dim: 64                        # hidden vocab
    rank: 64
    window: 3
    span_lengths: [1, 1, 1]        # in hidden space
    multiplicative_constant: 1.7
    scale: 10                      # sharpness (formerly `temperature: 0.1`)

dataset:
  window: 3
  dim: 64                          # surface vocab (= chunk_dim)
  length: 40                       # 20 hidden * chunk_size(2) surface tokens

student:
  dim: 64                          # = chunk_dim
  pe_max_sequence_length: 64
  dropout: 0.0
  use_key_projection: false
  layer_normalization: false
  use_mlp: false
  teacher_readout: false
  use_output_projection: false
  skip_connection: false
  attention_disentanglement: true
  pe_type: one_hot
  identity_decoder: true
  attention_bias: false

optimizer:
  lr: 0.08

misc:
  wandb:
    tags: ["hierarchical-dissection", "span-1-1-1"]
