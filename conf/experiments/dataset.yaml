# @package _global_
# Data-scaling sweep: for each base experiment, sweep the training set size.
# Launch with the ray launcher, e.g.:
#   python train.py experiments=dataset --multirun
defaults:
  - override /hydra/launcher: ray

hydra:
  sweeper:
    params:
      experiments: full_disection, baseline
      dataset.number.train: [100, 400, 2000, 3000, 6000, 9000]
